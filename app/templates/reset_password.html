{% extends "base.html" %}

{% block title %}Reset Password - Smart QA System{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--bs-secondary-bg);
        border-radius: 12px;
        padding: 2rem;
        margin: 2rem 0;
    }

    .auth-card {
        width: 100%;
        max-width: 450px;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        overflow: hidden;
        border: none;
    }

    .auth-header {
        background: linear-gradient(135deg, #20c997, #198754);
        color: white;
        padding: 2rem;
        text-align: center;
    }

    .auth-body {
        padding: 2rem;
    }

    .form-control {
        border-radius: 8px;
        padding: 0.75rem 1rem;
    }

    .btn-success {
        border-radius: 8px;
        padding: 0.75rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h4><i class="bi bi-shield-lock me-2"></i>Reset Password</h4>
        </div>
        <div class="auth-body">
            <form method="POST" action="{{ url_for('auth.reset_password') }}">
                <div class="mb-3">
                    <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="example@email.com" value="{{ email or '' }}" required>
                </div>

                <div class="mb-3">
                    <label for="code" class="form-label">Verification Code <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="code" name="code"
                           placeholder="6-digit code" required minlength="6" maxlength="6">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">New Password <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="At least 6 characters" required minlength="6">
                </div>

                <div class="mb-4">
                    <label for="password_confirm" class="form-label">Confirm New Password <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="password_confirm" name="password_confirm"
                           placeholder="Enter new password again" required minlength="6">
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check2-circle me-2"></i>Reset Password
                    </button>
                    <a href="{{ url_for('auth.forgot_password') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-envelope me-2"></i>Resend Code
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
