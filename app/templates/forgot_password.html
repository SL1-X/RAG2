{% extends "base.html" %}

{% block title %}Forgot Password - Smart QA System{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--bs-secondary-bg);
        border-radius: 12px;
        padding: 2rem;
        margin: 2rem 0;
    }

    .auth-card {
        width: 100%;
        max-width: 450px;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        overflow: hidden;
        border: none;
    }

    .auth-header {
        background: linear-gradient(135deg, #fd7e14, #f59f00);
        color: white;
        padding: 2rem;
        text-align: center;
    }

    .auth-body {
        padding: 2rem;
    }

    .form-control {
        border-radius: 8px;
        padding: 0.75rem 1rem;
    }

    .btn-warning {
        border-radius: 8px;
        padding: 0.75rem;
        color: #fff;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h4><i class="bi bi-envelope-check me-2"></i>Forgot Password</h4>
        </div>
        <div class="auth-body">
            <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                <div class="mb-4">
                    <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="example@email.com" required autofocus>
                    <div class="form-text">We will send a verification code to this email.</div>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-warning">
                        <i class="bi bi-send me-2"></i>Send Verification Code
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
